server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to the backend service
    location /query {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /upsert {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /stats {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /review {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /auth {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://backend:8000;
    }

    # SPA fallback — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
