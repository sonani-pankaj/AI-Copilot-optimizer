name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test ─────────────────────────────────────────────────────
  lint-backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff pytest pytest-asyncio httpx
      - run: pip install -r requirements.txt
      - run: ruff check .
      - name: Run unit tests
        env:
          JWT_SECRET: test-secret-for-ci
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: ""
          OPENAI_API_KEY: sk-test
          DEMO_USERNAME: admin
          DEMO_PASSWORD_HASH: "$2b$12$KIXnkXv5kB3L8W7HECzj8.VezVvp1HJ.mHVfzAbkGVEqJLH3N15W2"
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — skipping."

  # ── Dashboard: build ─────────────────────────────────────────────────────────
  build-dashboard:
    name: Dashboard (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── VS Code extension: typecheck ─────────────────────────────────────────────
  build-extension:
    name: VS Code Extension (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Docker Compose smoke test ────────────────────────────────────────────────
  smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [lint-backend, build-dashboard]
    env:
      JWT_SECRET: smoke-test-secret
      OPENAI_API_KEY: sk-test
      DEMO_USERNAME: admin
      DEMO_PASSWORD_HASH: "$2b$12$KIXnkXv5kB3L8W7HECzj8.VezVvp1HJ.mHVfzAbkGVEqJLH3N15W2"
    steps:
      - uses: actions/checkout@v4
      - name: Build and start services
        run: docker compose up -d --build backend postgres redis
      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy in time"
          docker compose logs backend
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down -v
